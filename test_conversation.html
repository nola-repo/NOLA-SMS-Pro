<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test: Create Conversation Webhook</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 40px;
            background: #f4f7f6;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            margin-top: 15px;
            color: #555;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #ddd;
            overflow-x: auto;
            margin-top: 20px;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Test Conversation Webhook 🚀</h2>
        <p>Use this tool to simulate a GHL Workflow triggering your new endpoint. If successful, look at your NOLA SMS
            Pro conversation tab!</p>

        <label for="locationId">GHL Location ID</label>
        <input type="text" id="locationId" placeholder="e.g. V52Lp7YQo1ISiSf907Lu" value="V52Lp7YQo1ISiSf907Lu">

        <label for="contactId">GHL Contact ID (Find one in CRM)</label>
        <input type="text" id="contactId" placeholder="e.g. abc123def456">

        <button onclick="testWebhook()">Fire Webhook Request</button>

        <label>Response:</label>
        <pre id="responseOutput">Waiting for test...</pre>
    </div>

    <script>
        async function testWebhook() {
            const locationId = document.getElementById('locationId').value.trim();
            const contactId = document.getElementById('contactId').value.trim();
            const output = document.getElementById('responseOutput');

            if (!contactId || !locationId) {
                alert('Please fill out both fields.');
                return;
            }

            output.textContent = 'Sending request to api/webhook/ghl_create_conversation.php...';

            try {
                const response = await fetch('/api/webhook/ghl_create_conversation.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Webhook-Secret': 'f7RkQ2pL9zV3tX8cB1nS4yW6'
                    },
                    body: JSON.stringify({
                        locationId: locationId,
                        contactId: contactId
                    })
                });

                const data = await response.json();
                output.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                output.textContent = 'Error: ' + error.message;
            }
        }
    </script>

</body>

</html>
