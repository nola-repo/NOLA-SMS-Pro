# Google Cloud Build: build, push and deploy the SMS API image to Cloud Run
# Run from project root: gcloud builds submit --config=cloudbuild.yaml .

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sms-api:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/sms-api:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sms-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sms-api:latest'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--min-instances'
      - '1'

images:
  - 'gcr.io/$PROJECT_ID/sms-api:latest'

options:
    logging: CLOUD_LOGGING_ONLY
